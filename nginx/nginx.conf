server {
    listen 80;
    server_name _;

    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host "redact";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        # SSE support
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    location / {
        proxy_pass http://frontend:80/;
        proxy_set_header Host "redact";
        proxy_set_header X-Real-IP $remote_addr;
    }
}
